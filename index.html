// Genius POS known category keywords for auto-detection
const GENIUS_FOOD_KEYWORDS = ['food','dine','dining','kitchen','entree','appetizer','dessert','beverage food','non-alc'];
const GENIUS_ALCOHOL_KEYWORDS = ['alcohol','bar','beer','wine','liquor','spirit','beverage alc','cocktail','draft'];

// ─── Storage ──────────────────────────────────────────────────────────────────
const STORE = 'pl_v1_data';
function loadData() { try { return migrateLegacy(JSON.parse(localStorage.getItem(STORE))||emptyStore()); } catch { return emptyStore(); } }
function emptyStore() { return { revenue:{}, expenses:{}, payroll:{}, vendors:ALL_VENDORS_DEF, flaggedDuplicates:[], customCategories:[], rent:{}, plLines:{ Food:[...FOOD_VENDORS], Alcohol:[...ALCOHOL_VENDORS], Utilities:[...UTILITIES], Other:[...OTHER_EXPENSES], 'Bank Card':[...BANK_CARD] } }; }
function migrateLegacy(d) {
  if (!d.flaggedDuplicates) d.flaggedDuplicates = [];
  if (!d.customCategories) d.customCategories = [];
  if (!d.rent) d.rent = {};
  if (!d.plLines) d.plLines = { Food:[...FOOD_VENDORS], Alcohol:[...ALCOHOL_VENDORS], Utilities:[...UTILITIES], Other:[...OTHER_EXPENSES], 'Bank Card':[...BANK_CARD] };
  // Migrate old revenue fields (foodDineIn/foodTakeout/foodDelivery/foodOther → foodSales, alcBeer/alcWine/alcLiquor → alcSales)
  if (d.revenue) {
    let revChanged = false;
    for (const mo in d.revenue) {
      for (const loc in d.revenue[mo]) {
        const r = d.revenue[mo][loc];
        if (r && r.foodSales === undefined) {
          const oldFood = (r.foodDineIn||0)+(r.foodTakeout||0)+(r.foodDelivery||0)+(r.foodOther||0);
          if (oldFood > 0) { r.foodSales = oldFood; revChanged = true; }
        }
        if (r && r.alcSales === undefined) {
          const oldAlc = (r.alcBeer||0)+(r.alcWine||0)+(r.alcLiquor||0);
          if (oldAlc > 0) { r.alcSales = oldAlc; revChanged = true; }
        }
      }
    }
    if (revChanged) saveData(d);
  }
  // Ensure every vendor has a unique id and plLine field
  if (d.vendors && d.vendors.length) {
    let changed = false;
    d.vendors = d.vendors.map((v, i) => {
      let u = v;
      if (!u.id) { changed = true; u = { ...u, id: 'mig_' + i + '_' + Math.random().toString(36).slice(2,8) }; }
      if (u.plLine === undefined) { changed = true; u = { ...u, plLine: '' }; }
      return u;
    });
    if (changed) saveData(d);
  }
  return d;
}

// Dynamic categories hook: defaults + user-created (must be called within Ctx.Provider)
function useAllCategories() {
  const { data } = useApp();
  return useMemo(() => [...CATEGORIES, ...(data.customCategories||[])], [data.customCategories]);
}
// Note: useAllCategories is used in VendorManagement and ExpenseEntry components only (inside Provider)
function usePLLines() {
  const { data } = useApp();
  return useMemo(()=>{
    const pl = data.plLines || { Food:FOOD_VENDORS, Alcohol:ALCOHOL_VENDORS, Utilities:UTILITIES, Other:OTHER_EXPENSES, 'Bank Card':BANK_CARD };
    const allLines = [...(pl.Food||[]),...(pl.Alcohol||[]),...(pl.Utilities||[]),...(pl.Other||[]),...(pl['Bank Card']||[])];
    const lineCat = {};
    for (const cat in pl) (pl[cat]||[]).forEach(v=>lineCat[v]=cat);
    return { plLines:pl, allPLLines:allLines, plLineCat:lineCat };
  },[data.plLines]);
}
function saveData(d) { localStorage.setItem(STORE, JSON.stringify(d)); }

// ─── Helpers ──────────────────────────────────────────────────────────────────
function fmtCur(v) { if (!v&&v!==0) return '-'; return '$'+Math.abs(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtPct(num,den) { if (!den||den===0) return '-'; return ((num/den)*100).toFixed(1)+'%'; }
function getCurrentMonth() { return new Date().toISOString().slice(0,7); }
function monthLabel(m) { if(!m)return''; const [y,mo]=m.split('-'); return new Date(+y,+mo-1,1).toLocaleDateString('en-US',{month:'long',year:'numeric'}); }
function uid() { return Math.random().toString(36).slice(2)+Date.now().toString(36); }

// ─── CSV Parser ───────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').filter(l=>l.trim());
  if (lines.length < 2) return { headers:[], rows:[] };
  function parseLine(line) {
    const cells = []; let cur = ''; let inQ = false;
    for (let i=0;i<line.length;i++) {
      const c = line[i];
      if (c==='"') { inQ=!inQ; }
      else if (c===','&&!inQ) { cells.push(cur.trim()); cur=''; }
      else { cur+=c; }
    }
    cells.push(cur.trim());
    return cells;
  }
  const headers = parseLine(lines[0]);
  const rows = lines.slice(1).map(l=>{ const cells=parseLine(l); const obj={}; headers.forEach((h,i)=>{ obj[h]=cells[i]||''; }); return obj; });
  return { headers, rows };
}

// Auto-detect which CSV column likely represents each field
function autoDetect(headers) {
  function find(keywords) {
    const h = headers.find(hdr => keywords.some(k=>hdr.toLowerCase().includes(k)));
    return h||'';
  }
  return {
    date: find(['date','day','period','business date']),
    location: find(['location','store','site','unit','restaurant','branch']),
    category: find(['category','dept','department','revenue center','type','class','group','section']),
    netSales: find(['net sales','netsales','net_sales','net revenue','net amt']),
    grossSales: find(['gross sales','grosssales','gross_sales','gross revenue','total sales','total revenue','amount','sales']),
    vendor: find(['vendor','payee','supplier','merchant','company']),
    description: find(['description','memo','notes','note','desc','item','product']),
  };
}

// ─── Genius POS Daily Summary Parser ─────────────────────────────────────────
function parseGeniusSummary(text, filename) {
  const lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
  function qParse(line) { const c=[]; const re=/"([^"]*)"/g; let m; while((m=re.exec(line))!==null) c.push(m[1]); return c; }
  function money(s) { return parseFloat((s||'0').replace(/[$,]/g,''))||0; }

  // Split text into named sections
  const SEC_NAMES=['SALES','TRANSACTIONS','CASH','CLOSED TICKETS','TAX CATEGORIES','DAYPARTS','REVENUE CENTERS','GROUPS','SECTIONS','REPORT CATEGORIES'];
  const secs={}; let cur=null, curL=[];
  for(const raw of lines){ const ln=raw.trim(); if(!ln) continue;
    const hdr=SEC_NAMES.find(h=>ln===h||ln.startsWith(h+' '));
    if(hdr){ if(cur) secs[cur]=curL; cur=hdr; curL=[ln]; } else if(cur) curL.push(ln);
  }
  if(cur) secs[cur]=curL;

  // Date range from SALES header: "SALES Mon 12-01-2025 - Wed 12-31-2025"
  let dateRange={start:null,end:null,month:null};
  if(secs.SALES){ const dm=secs.SALES[0].match(/(\d{2})-(\d{2})-(\d{4})\s*-\s*\w+\s+(\d{2})-(\d{2})-(\d{4})/);
    if(dm){ dateRange.start=`${dm[3]}-${dm[1]}-${dm[2]}`; dateRange.end=`${dm[6]}-${dm[4]}-${dm[5]}`; dateRange.month=`${dm[3]}-${dm[1]}`; }
  }

  // Detect location from filename
  let detectedLoc=null;
  if(filename){ const fn=filename.toLowerCase(); for(const loc of LOCATIONS){ if(fn.includes(loc.toLowerCase())){detectedLoc=loc;break;} } }

  // SALES section: key-value pairs
  const salesRaw={};
  if(secs.SALES) for(const ln of secs.SALES.slice(1)){ const c=qParse(ln); if(c.length>=2) salesRaw[c[0]]=money(c[1]); }

  // Generic table parser (skip header + column names, exclude totals)
  function tbl(name,min){ const rows=[]; if(!secs[name])return rows;
    for(const ln of secs[name].slice(2)){ const c=qParse(ln); if(c.length>=min&&!c[0].toLowerCase().startsWith('total')) rows.push(c); } return rows; }

  const transactions=tbl('TRANSACTIONS',5).map(c=>({type:c[0],count:parseInt(c[1])||0,amount:money(c[2]),tip:money(c[3]),total:money(c[4])}));
  const groups=tbl('GROUPS',4).map(c=>({name:c[0],qty:parseInt(c[1])||0,net:money(c[2]),gross:money(c[3])}));
  const menuSections=tbl('SECTIONS',4).map(c=>({name:c[0],qty:parseInt(c[1])||0,net:money(c[2]),gross:money(c[3])}));
  const revCenters=tbl('REVENUE CENTERS',5).map(c=>({name:c[0],qty:parseInt(c[1])||0,net:money(c[4])}));
  const dayparts=tbl('DAYPARTS',5).map(c=>({name:c[0],qty:parseInt(c[1])||0,net:money(c[4])}));

  // ── Food from GROUPS ──
  const F_KW=['food','online food','menu'];
  let foodNet=0; const foodGroups=[];
  for(const g of groups){ const n=g.name.toLowerCase();
    if(F_KW.some(k=>n.includes(k))){ foodNet+=g.net; foodGroups.push(g); }
  }

  // ── Alcohol from specific SECTIONS types ──
  const ALC_SEC_TYPES=['bottle beer','draft beer','liquor a-h','liquor i-p','liquor q-z','margaritas','wine'];
  let alcNet=0; const alcItems=[];
  for(const s of menuSections){
    if(ALC_SEC_TYPES.some(k=>s.name.toLowerCase()===k)){ alcNet+=s.net; alcItems.push(s); }
  }
  let beerNet=0, wineNet=0, liqNet=alcNet;

  return {
    valid:!!(secs.SALES&&(secs.GROUPS||secs.SECTIONS)),
    dateRange, detectedLoc,
    salesRaw,
    sales:{ grossSales:salesRaw['Gross Sales']||0, netSales:salesRaw['Net Sales']||0,
      discounts:Math.abs(salesRaw['Discounts']||0)+Math.abs(salesRaw['Auto Pricing Discounts']||0),
      adjustments:Math.abs(salesRaw['Adjustments']||0), taxes:salesRaw['Taxes']||0,
      tips:salesRaw['Tips']||0, grossReceipts:salesRaw['Gross Receipts']||0 },
    transactions, groups, foodGroups, alcItems, menuSections, revCenters, dayparts,
    foodNet, alcNet, beerNet, wineNet, liqNet,
  };
}

// ─── Duplicate Detection Engine ───────────────────────────────────────────────
const DAY_MS = 24 * 60 * 60 * 1000;

function detectDuplicates(incomingList, existingExpenses) {
  // Returns { clean: [...], flags: [...] }
  // clean  → safe to import directly
  // flags  → potential duplicates needing review
  const flags = [];
  const clean = [];
  for (const inc of incomingList) {
    let matched = null;
    for (const ex of existingExpenses) {
      const amtClose   = Math.abs((+inc.amount||0) - (+ex.amount||0)) < 0.02;
      const vendorSame = (inc.vendor||'').toUpperCase().trim() === (ex.vendor||'').toUpperCase().trim();
      const dayDiff    = (inc.date && ex.date) ? Math.abs(new Date(inc.date)-new Date(ex.date))/DAY_MS : 999;

      // HIGH — invoice number match (strongest signal)
      if (inc.invoiceNumber && ex.invoiceNumber &&
          inc.invoiceNumber.trim().toUpperCase() === ex.invoiceNumber.trim().toUpperCase()) {
        matched = { existing:ex, confidence:'HIGH', reason:'Matching invoice / receipt number' };
        break;
      }
      // HIGH — exact date + vendor + amount
      if (inc.date === ex.date && vendorSame && amtClose) {
        matched = { existing:ex, confidence:'HIGH', reason:'Same date, vendor & amount' };
        break;
      }
      // MED — same vendor + amount within 3 days
      if (vendorSame && amtClose && dayDiff > 0 && dayDiff <= 3) {
        matched = { existing:ex, confidence:'MED', reason:`Same vendor & amount, ${Math.round(dayDiff)} day(s) apart` };
        break;
      }
    }
    if (matched) {
      flags.push({ id:uid(), incoming:{...inc}, existingId:matched.existing.id, existing:{...matched.existing}, confidence:matched.confidence, reason:matched.reason, month:inc._month||'', status:'pending' });
    } else {
      clean.push(inc);
    }
  }
  return { clean, flags };
}

// Quick inline duplicate check (for manual entry warning — returns first match or null)
function quickDupCheck(entry, existingExpenses) {
  if (!entry.vendor || !entry.amount) return null;
  for (const ex of existingExpenses) {
    const amtClose   = Math.abs((+entry.amount||0) - (+ex.amount||0)) < 0.02;
    const vendorSame = (entry.vendor||'').toUpperCase().trim() === (ex.vendor||'').toUpperCase().trim();
    const dayDiff    = (entry.date && ex.date) ? Math.abs(new Date(entry.date)-new Date(ex.date))/DAY_MS : 999;
    if (vendorSame && amtClose && dayDiff <= 1) return ex;
  }
  return null;
}

// Epson ScanSmart column auto-detect (extends base autoDetect)
function epsonAutoDetect(headers) {
  function find(...kws) {
    const h = headers.find(hdr => kws.some(k => hdr.toLowerCase().includes(k)));
    return h || '';
  }
  return {
    date:          find('date', 'transaction date', 'receipt date', 'invoice date', 'scan date'),
    vendor:        find('vendor', 'store name', 'store', 'merchant', 'company', 'payee', 'supplier'),
    total:         find('total', 'grand total', 'amount', 'total amount'),
    tax:           find('tax amount', 'sales tax', 'tax', 'vat'),
    invoiceNumber: find('invoice number', 'invoice #', 'receipt number', 'receipt #', 'invoice no', 'ref', 'number', 'doc'),
    category:      find('category', 'expense category', 'expense type'),
    paymentMethod: find('payment method', 'payment', 'method', 'tender'),
    notes:         find('memo', 'notes', 'description', 'comment', 'remarks'),
    location:      find('location', 'store', 'site', 'unit', 'branch'),
    docType:       find('type', 'document type', 'doc type'),
  };
}

// ─── Epson ScanSmart Import Modal ─────────────────────────────────────────────
function EpsonImportModal({ onClose }) {
  const { data, setData, month } = useApp();
  const [step, setStep]           = useState(0);
  const [parsed, setParsed]       = useState(null);
  const [mapping, setMapping]     = useState({});
  const [locMode, setLocMode]     = useState('fixed');
  const [fixedLoc, setFixedLoc]   = useState(LOCATIONS[0]);
  const [amtMode, setAmtMode]     = useState('total');   // 'total' | 'total-tax'
  const [preview, setPreview]     = useState([]);
  const [result, setResult]       = useState(null);      // { imported, flagged }
  const fileRef = useRef();

  function handleFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const p = parseCSV(e.target.result);
      setParsed(p);
      setMapping(epsonAutoDetect(p.headers));
      setStep(1);
    };
    reader.readAsText(file);
  }

  function buildPreview() {
    if (!parsed) return [];
    const { rows } = parsed;
    return rows.map(row => {
      const rawTotal = (row[mapping.total]||'').replace(/[$,\s]/g,'');
      const rawTax   = (row[mapping.tax]||'').replace(/[$,\s]/g,'');
      const total    = parseFloat(rawTotal)||0;
      const tax      = parseFloat(rawTax)||0;
      const amount   = amtMode==='total-tax' ? Math.max(total - tax, 0) : total;
      if (amount === 0) return null;
      const vendor   = (row[mapping.vendor]||'').toUpperCase().trim();
      if (!vendor) return null;
      const date     = (row[mapping.date]||'').trim() || (month+'-01');
      const invNum   = (row[mapping.invoiceNumber]||'').trim();
      const notes    = (row[mapping.notes]||'').trim();
      const rawCat   = (row[mapping.category]||'').trim();
      const pmMethod = (row[mapping.paymentMethod]||'').trim();
      const loc      = locMode==='column' ? (row[mapping.location]||fixedLoc) : fixedLoc;
      // Look up category from Vendor Map (case-insensitive)
      const vUp = vendor.toUpperCase();
      const vm = (data.vendors||[]).find(v=>(v.name||'').toUpperCase()===vUp);
      const category = vm ? vm.category : (rawCat || 'Other');
      return { id:uid(), date, vendor, amount, invoiceNumber:invNum, category, location:loc, notes: [notes, pmMethod ? `Payment: ${pmMethod}` : ''].filter(Boolean).join(' | '), _month:month };
    }).filter(Boolean);
  }

  function handlePreview() { setPreview(buildPreview()); setStep(2); }

  function handleImport() {
    const allExisting = data.expenses[month] || [];
    const { clean, flags } = detectDuplicates(preview, allExisting);
    setData(prev => {
      const d = {...prev};
      // Add clean entries
      if (!d.expenses[month]) d.expenses = {...d.expenses, [month]:[]};
      d.expenses[month] = [...clean, ...d.expenses[month]];
      // Queue flagged for review
      d.flaggedDuplicates = [...(d.flaggedDuplicates||[]), ...flags];
      return d;
    });
    setResult({ imported: clean.length, flagged: flags.length });
    setStep(3);
  }

  if (step === 3 && result) return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-box" style={{maxWidth:500}} onClick={e=>e.stopPropagation()}>
        <div className="modal-body" style={{textAlign:'center',padding:'40px 30px'}}>
          <div style={{fontSize:44,marginBottom:12}}>✅</div>
          <div style={{fontWeight:700,fontSize:18,color:'#0f172a',marginBottom:8}}>Epson Import Complete</div>
          <div style={{display:'flex',justifyContent:'center',gap:24,marginTop:16}}>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:28,fontWeight:700,color:'#16a34a'}}>{result.imported}</div>
              <div style={{fontSize:12,color:'#64748b'}}>Imported cleanly</div>
            </div>
            {result.flagged > 0 && (
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:28,fontWeight:700,color:'#dc2626'}}>{result.flagged}</div>
                <div style={{fontSize:12,color:'#64748b'}}>Flagged for review</div>
              </div>
            )}
          </div>
          {result.flagged > 0 && <div style={{marginTop:14,background:'#fef2f2',border:'1px solid #fecaca',borderRadius:8,padding:'10px 14px',fontSize:12,color:'#991b1b'}}>⚠️ {result.flagged} possible duplicate{result.flagged!==1?'s':''} sent to <b>Dup. Review</b> in the sidebar — please resolve them.</div>}
          <button className="btn-primary" style={{marginTop:20}} onClick={onClose}>Done</button>
        </div>
      </div>
    </div>
  );

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <div>
            <div style={{fontWeight:700,fontSize:16,color:'#0f172a',display:'flex',alignItems:'center',gap:8}}><Icon name="scan"/>Import from Epson ScanSmart</div>
            <div style={{fontSize:12,color:'#64748b',marginTop:2}}>Invoice &amp; Receipt Manager CSV export</div>
          </div>

              <div className="drop-zone" onClick={()=>fileRef.current.click()}

// ─── P&L Calculation ──────────────────────────────────────────────────────────
function usePL() {
  const { data, month, location } = useApp();
  return useMemo(()=>{
    const locs = location===ALL_LOCS ? LOCATIONS : [location];
    const rev = data.revenue[month]||{};
    const exp = data.expenses[month]||[];
    const pay = data.payroll[month]||{};
    let foodSales=0, alcSales=0;
    for(const l of locs){ const r=rev[l]||{}; foodSales+=r.foodSales!==undefined?(+r.foodSales||0):((r.foodDineIn||0)+(r.foodTakeout||0)+(r.foodDelivery||0)+(r.foodOther||0)); alcSales+=r.alcSales!==undefined?(+r.alcSales||0):((r.alcBeer||0)+(r.alcWine||0)+(r.alcLiquor||0)); }
    const totalSales=foodSales+alcSales;
    const rentData = data.rent[month]||{};
    // Build a map: P&L line item → list of real vendor names (from Vendor Map)
    const plToVendors = {};
    for(const v of (data.vendors||[])) {
      if(v.plLine) {
        const key = v.plLine.toUpperCase();
        if(!plToVendors[key]) plToVendors[key]=[];
        plToVendors[key].push((v.name||'').toUpperCase());
      }
    }
    function vendorAmt(plLine){
      const plUp = plLine.toUpperCase();
      const mapped = plToVendors[plUp]||[];
      let base = exp.filter(e=>{
        if(location!==ALL_LOCS&&e.location!==location) return false;
        // If expense has an explicit plLine, use that
        if(e.plLine) return (e.plLine||'').toUpperCase()===plUp;
        const vUp = (e.vendor||'').toUpperCase();
        return vUp===plUp || mapped.includes(vUp);
      }).reduce((s,e)=>s+(+e.amount||0),0);
      if (plLine==='RENT') { for(const l of locs) base += (+rentData[l]||0); }
      return base;
    }
    let payTotals={}; for(const f of PAYROLL_FIELDS) payTotals[f.key]=0;
    for(const l of locs){ const p=pay[l]||{}; for(const f of PAYROLL_FIELDS) payTotals[f.key]+=(+p[f.key]||0); }
    const totalPayroll=Object.entries(payTotals).reduce((a,[k,v])=>a+(k==='tips'?0:v),0);
    const pll = data.plLines || { Food:FOOD_VENDORS, Alcohol:ALCOHOL_VENDORS, Utilities:UTILITIES, Other:OTHER_EXPENSES, 'Bank Card':BANK_CARD };
    const foodExp=(pll.Food||[]).map(v=>({vendor:v,amt:vendorAmt(v)}));
    const alcExp=(pll.Alcohol||[]).map(v=>({vendor:v,amt:vendorAmt(v)}));
    const utilExp=(pll.Utilities||[]).map(v=>({vendor:v,amt:vendorAmt(v)}));
    const otherExp=(pll.Other||[]).map(v=>({vendor:v,amt:vendorAmt(v)}));
    const bankExp=(pll['Bank Card']||[]).map(v=>({vendor:v,amt:vendorAmt(v)}));
    const totalFood=foodExp.reduce((s,v)=>s+v.amt,0);
    const totalAlc=alcExp.reduce((s,v)=>s+v.amt,0);
    const totalUtil=utilExp.reduce((s,v)=>s+v.amt,0);
    const totalOther=otherExp.reduce((s,v)=>s+v.amt,0);
    const totalBank=bankExp.reduce((s,v)=>s+v.amt,0);
    const totalCOGS=totalFood+totalAlc;
    const totalExpenses=totalCOGS+totalUtil+totalOther+totalBank+totalPayroll;
    const netIncome=totalSales-totalExpenses;
    const primeCost=totalCOGS+totalPayroll;
    return { foodSales,alcSales,totalSales,foodExp,alcExp,utilExp,otherExp,bankExp,totalFood,totalAlc,totalUtil,totalOther,totalBank,totalCOGS,totalPayroll,payTotals,totalExpenses,netIncome,primeCost };
  },[data,month,location]);
}

  const [preview, setPreview] = useState([]);
  const [done, setDone] = useState(false);
  const fileRef = useRef();

  function handleFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const result = parseCSV(e.target.result);
      setParsed(result);
      const det = autoDetect(result.headers);
      setMapping(det);
      setStep(1);
    };
    reader.readAsText(file);
  }

  function lookupCategory(vendorName, vendorMap) {
    const up = (vendorName||'').toUpperCase();
    const match = vendorMap.find(v=>(v.name||'').toUpperCase()===up);
    return match ? match.category : 'Other';
  }

  function buildPreview() {
    if (!parsed) return [];
    const { rows } = parsed;
    const amtCol = mapping.netSales || mapping.grossSales;
    const vendorCol = mapping.vendor || mapping.description;
    const dateCol = mapping.date;
    const locCol = locMode==='column' ? mapping.location : null;
    const catCol = catMode==='column' ? mapping.category : null;

    const result = [];
    for (const row of rows) {
      const rawAmt = (row[amtCol]||'').replace(/[$,]/g,'');
      const amt = parseFloat(rawAmt)||0;
      if (amt===0) continue;
      const vendor = (row[vendorCol]||'').toUpperCase().trim();
      if (!vendor) continue;
      const date = row[dateCol]||month+'-01';
      const loc = locMode==='column' ? (row[locCol]||fixedLoc) : fixedLoc;
      let cat = fixedCat;
      if (catMode==='auto') cat = lookupCategory(vendor, data.vendors||[]);
      else if (catMode==='column') cat = row[catCol]||fixedCat;
      const subCatVendor = (data.vendors||[]).find(v=>(v.name||'').toUpperCase()===vendor.toUpperCase());
      const mappedVendor = FOOD_VENDORS.includes(vendor)||ALCOHOL_VENDORS.includes(vendor)||UTILITIES.includes(vendor)||OTHER_EXPENSES.includes(vendor)||BANK_CARD.includes(vendor) ? vendor : vendor;
      result.push({ id:uid(), date, location:loc, vendor:mappedVendor, amount:amt, category:cat, subCategory:subCatVendor?.subCategory||'', notes:'' });
    }
    return result;
  }

  function handlePreview() { setPreview(buildPreview()); setStep(2); }

  function handleImport() {
    setData(prev=>{
      const d={...prev};
      if (!d.expenses[month]) d.expenses={...d.expenses,[month]:[]};
      d.expenses[month]=[...preview,...d.expenses[month]];
      return d;
    });
    setDone(true); setStep(3);
  }

  const catBadge = { Food:'badge-food',Alcohol:'badge-alcohol',Utilities:'badge-utilities',Other:'badge-other','Bank Card':'badge-bank' };

  if (done) return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-box" style={{maxWidth:480}} onClick={e=>e.stopPropagation()}>
        <div className="modal-body" style={{textAlign:'center',padding:'40px 30px'}}>
          <div style={{fontSize:48,marginBottom:12}}>✅</div>
          <div style={{fontWeight:700,fontSize:18,color:'#0f172a',marginBottom:8}}>Import Complete!</div>
          <div style={{color:'#64748b',fontSize:14}}>{preview.length} expense entr{preview.length===1?'y':'ies'} imported for <b>{monthLabel(month)}</b>.</div>
          <button className="btn-primary" style={{marginTop:20}} onClick={onClose}>Done</button>
        </div>
      </div>
    </div>
  );

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <div>
            <div style={{fontWeight:700,fontSize:16,color:'#0f172a'}}>Import Expenses / IR Data</div>
            <div style={{fontSize:12,color:'#64748b',marginTop:2}}>Upload a CSV export from Genius POS, QuickBooks, or your accounting system</div>
          </div>
          <button className="btn-ghost" style={{padding:'4px 8px'}} onClick={onClose}><Icon name="x"/></button>
        </div>

        <div className="modal-body">
          <StepBar steps={['Upload File','Map Columns','Preview & Import']} current={step}/>

          {step===0 && (
            <div>
              <div style={{background:'#fefce8',border:'1px solid #fde047',borderRadius:8,padding:'10px 14px',marginBottom:18,display:'flex',gap:10}}>
                <Icon name="info" size={16}/>
                <div style={{fontSize:12.5,color:'#713f12'}}>
                  <b>Supported sources:</b> Genius POS → Purchase Reports or Vendor Payments; QuickBooks → Expense Report (CSV); Any vendor invoice export with Date, Vendor, and Amount columns.
                </div>
              </div>
              <div className="drop-zone" onClick={()=>fileRef.current.click()}
                onDragOver={e=>{e.preventDefault();e.currentTarget.classList.add('drag-over');}}
                onDragLeave={e=>e.currentTarget.classList.remove('drag-over')}
                onDrop={e=>{e.preventDefault();e.currentTarget.classList.remove('drag-over');handleFile(e.dataTransfer.files[0]);}}>
                <div style={{fontSize:36,marginBottom:10}}>📂</div>
                <div style={{fontWeight:600,color:'#0f172a',marginBottom:4}}>Drop your expense CSV here</div>
                <div style={{color:'#64748b',fontSize:13}}>or click to browse files (.csv)</div>
                <input ref={fileRef} type="file" accept=".csv,.txt" style={{display:'none'}} onChange={e=>handleFile(e.target.files[0])}/>
              </div>
            </div>
          )}

          {step===1 && parsed && (
            <div>
              <div style={{fontWeight:600,color:'#0f172a',marginBottom:14,fontSize:14}}>
                Detected {parsed.headers.length} columns, {parsed.rows.length} rows
              </div>
              {[
                {label:'📅 Date Column',key:'date',hint:'Transaction or invoice date'},
                {label:'🏢 Vendor / Payee',key:'vendor',hint:'Supplier name — e.g. "Payee", "Vendor", "Supplier"'},
                {label:'💰 Amount Column',key:'netSales',hint:'Invoice or payment amount'},
              ].map(({label,key,hint})=>(
                <div key={key} className="map-row">
                  <div><div style={{fontWeight:600,fontSize:13}}>{label}</div><div style={{fontSize:11,color:'#94a3b8'}}>{hint}</div></div>
                  <Icon name="arrow" size={14}/>
                  <select value={mapping[key]||''} onChange={e=>setMapping(m=>({...m,[key]:e.target.value}))} style={{width:'100%'}}>
                    <option value="">— not mapped —</option>
                    {parsed.headers.map(h=><option key={h} value={h}>{h}</option>)}
                  </select>
                </div>
              ))}

              <div className="map-row">
                <div><div style={{fontWeight:600,fontSize:13}}>📍 Location</div></div>
                <Icon name="arrow" size={14}/>
                <div style={{display:'flex',flexDirection:'column',gap:5}}>
                  <label style={{display:'flex',alignItems:'center',gap:6,fontSize:13}}>
                    <input type="radio" checked={locMode==='fixed'} onChange={()=>setLocMode('fixed')}/>
                    Use:
                    <select value={fixedLoc} onChange={e=>setFixedLoc(e.target.value)}>
                      {LOCATIONS.map(l=><option key={l} value={l}>{l}</option>)}
                    </select>
                  </label>
                  <label style={{display:'flex',alignItems:'center',gap:6,fontSize:13}}>
                    <input type="radio" checked={locMode==='column'} onChange={()=>setLocMode('column')}/>
                    From column:
                    <select value={mapping.location||''} onChange={e=>setMapping(m=>({...m,location:e.target.value}))} disabled={locMode!=='column'}>
                      <option value="">— select —</option>
                      {parsed.headers.map(h=><option key={h} value={h}>{h}</option>)}
                    </select>
                  </label>
                </div>
              </div>

              <div className="map-row">
                <div><div style={{fontWeight:600,fontSize:13}}>🏷️ Category</div><div style={{fontSize:11,color:'#94a3b8'}}>How to assign Food/Alcohol/etc.</div></div>
                <Icon name="arrow" size={14}/>
                <div style={{display:'flex',flexDirection:'column',gap:5}}>
                  <label style={{display:'flex',alignItems:'center',gap:6,fontSize:13}}>
                    <input type="radio" checked={catMode==='auto'} onChange={()=>setCatMode('auto')}/>
                    Auto-detect from Vendor Map
                  </label>
                  <label style={{display:'flex',alignItems:'center',gap:6,fontSize:13}}>
                    <input type="radio" checked={catMode==='fixed'} onChange={()=>setCatMode('fixed')}/>
                    Set all to:
                    <select value={fixedCat} onChange={e=>setFixedCat(e.target.value)} disabled={catMode!=='fixed'}>
                      {CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
                    </select>
                  </label>
                  <label style={{display:'flex',alignItems:'center',gap:6,fontSize:13}}>
                    <input type="radio" checked={catMode==='column'} onChange={()=>setCatMode('column')}/>
                    From column:
                    <select value={mapping.category||''} onChange={e=>setMapping(m=>({...m,category:e.target.value}))} disabled={catMode!=='column'}>
                      <option value="">— select —</option>
                      {parsed.headers.map(h=><option key={h} value={h}>{h}</option>)}
                    </select>
                  </label>
                </div>
              </div>

              <div style={{marginTop:16}}>
                <div style={{fontWeight:600,fontSize:13,color:'#0f172a',marginBottom:8}}>File preview (first 5 rows):</div>
                <div style={{overflowX:'auto'}}>
                  <table className="preview-table">
                    <thead><tr>{parsed.headers.map(h=><th key={h} style={{textAlign:'left',whiteSpace:'nowrap'}}>{h}</th>)}</tr></thead>
                    <tbody>{parsed.rows.slice(0,5).map((r,i)=><tr key={i}>{parsed.headers.map(h=><td key={h} style={{textAlign:'left',whiteSpace:'nowrap',maxWidth:120,overflow:'hidden',textOverflow:'ellipsis'}}>{r[h]}</td>)}</tr>)}</tbody>
                  </table>
                </div>
              </div>
            </div>
          )}

          {step===2 && (
            <div>
              <div style={{fontWeight:600,color:'#0f172a',marginBottom:4,fontSize:14}}>Preview — {preview.length} expenses to import into {monthLabel(month)}</div>
              {preview.length===0 ? (
                <div style={{textAlign:'center',padding:'30px',color:'#94a3b8'}}>
                  <div style={{fontSize:32}}>⚠️</div>
                  <div style={{fontWeight:600,color:'#374151',marginTop:8}}>No rows matched. Go back and check your column mappings.</div>
                </div>
              ) : (
                <div style={{overflowX:'auto'}}>
                  <table>
                    <thead><tr><th style={{textAlign:'left'}}>Date</th><th style={{textAlign:'left'}}>Location</th><th style={{textAlign:'left'}}>Category</th><th style={{textAlign:'left'}}>Vendor</th><th>Amount</th></tr></thead>
                    <tbody>
                      {preview.slice(0,50).map((r,i)=>(
                        <tr key={i}>
                          <td style={{textAlign:'left',fontSize:12}}>{r.date}</td>
                          <td style={{textAlign:'left',fontSize:12}}>{r.location}</td>
                          <td style={{textAlign:'left'}}><span className={`badge ${catBadge[r.category]||'badge-other'}`}>{r.category}</span></td>
                          <td style={{textAlign:'left',fontWeight:500,fontSize:12}}>{r.vendor}</td>
                          <td style={{fontWeight:600,color:'#dc2626'}}>{fmtCur(r.amount)}</td>
                        </tr>
                      ))}
                      {preview.length>50&&<tr><td colSpan={5} style={{textAlign:'center',color:'#94a3b8',fontSize:12}}>...and {preview.length-50} more rows</td></tr>}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          )}
        </div>

        <div className="modal-footer">
          {step>0&&step<3&&<button className="btn-ghost" onClick={()=>setStep(s=>s-1)}>← Back</button>}
          {step===0&&<button className="btn-ghost" onClick={onClose}>Cancel</button>}
          {step===1&&<button className="btn-primary" onClick={handlePreview} disabled={!mapping.netSales&&!mapping.grossSales&&!mapping.vendor}>Preview Import →</button>}
          {step===2&&<button className="btn-success" onClick={handleImport} disabled={preview.length===0} style={{display:'flex',alignItems:'center',gap:6}}><Icon name="import"/>Import {preview.length} rows</button>}
        </div>
      </div>
    </div>
  );
}

function PLReport() {
  const { month, location, data:appData } = useApp();
  const pl = usePL();
  const rev = appData.revenue[month]||{};
  const exp = appData.expenses[month]||[];
  const pay = appData.payroll[month]||{};
  const colHeaders = location===ALL_LOCS ? [...LOCATIONS,'All Locations'] : [location];

  function locSales(loc,type) { const r=rev[loc]||{}; if(type==='food') return r.foodSales!==undefined?(+r.foodSales||0):((r.foodDineIn||0)+(r.foodTakeout||0)+(r.foodDelivery||0)+(r.foodOther||0)); return r.alcSales!==undefined?(+r.alcSales||0):((r.alcBeer||0)+(r.alcWine||0)+(r.alcLiquor||0)); }
  const rentData = appData.rent[month]||{};
  // Build map: P&L line item → real vendor names (from Vendor Map)
  const plToVendorsLoc = useMemo(()=>{
    const m={};
    for(const v of (appData.vendors||[])) {
      if(v.plLine) {
        const key=v.plLine.toUpperCase();
        if(!m[key]) m[key]=[];
        m[key].push((v.name||'').toUpperCase());
      }
    }
    return m;
  },[appData.vendors]);
  function locVendorAmt(loc,plLine) {
    const plUp = plLine.toUpperCase();
    const mapped = plToVendorsLoc[plUp]||[];
    let base = exp.filter(e=>{
      if(e.location!==loc) return false;
      if(e.plLine) return (e.plLine||'').toUpperCase()===plUp;
      const vUp=(e.vendor||'').toUpperCase();
      return vUp===plUp || mapped.includes(vUp);
    }).reduce((s,e)=>s+(+e.amount||0),0);
    if (plLine==='RENT') base += (+rentData[loc]||0);
    return base;
  }
  function locPayroll(loc) { const p=pay[loc]||{}; return PAYROLL_FIELDS.reduce((s,f)=>s+(f.key==='tips'?0:(+p[f.key]||0)),0); }

  function exportCSV() {
    const rows=[['Category','Item',...colHeaders,'% of Sales']];
    rows.push(['GROSS SALES','Food',...(location===ALL_LOCS?[...LOCATIONS.map(l=>locSales(l,'food')),pl.foodSales]:[locSales(location,'food')]),'-']);
    rows.push(['GROSS SALES','Alcohol',...(location===ALL_LOCS?[...LOCATIONS.map(l=>locSales(l,'alc')),pl.alcSales]:[locSales(location,'alc')]),'-']);
    const csv=rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
    const a=document.createElement('a'); a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv); a.download=`PL_${month}_${location.replace(/ /g,'_')}.csv`; a.click();
  }

  function SectionRow({label}) { return <tr className="section-header"><td colSpan={colHeaders.length+2}>{label}</td></tr>; }

  function VendorRow({vendor}) {
    const locAmts=LOCATIONS.map(l=>locVendorAmt(l,vendor));
    const total=locAmts.reduce((a,b)=>a+b,0);
    const cols=location===ALL_LOCS?[...locAmts,total]:[locVendorAmt(location,vendor)];
    const showVal=cols[cols.length-1];
    return <tr><td style={{paddingLeft:24,color:'#374151'}}>{vendor}</td>{cols.map((v,i)=><td key={i}>{v>0?fmtCur(v):'-'}</td>)}<td style={{color:'#94a3b8'}}>{showVal>0?fmtPct(showVal,pl.totalSales):'-'}</td></tr>;
  }

  function SubtotalRow({label,items,foodDen,alcDen}) {
    const locTotals=LOCATIONS.map(l=>items.reduce((s,v)=>s+locVendorAmt(l,v.vendor),0));
    const allTotal=locTotals.reduce((a,b)=>a+b,0);
    const cols=location===ALL_LOCS?[...locTotals,allTotal]:[items.reduce((s,v)=>s+locVendorAmt(location,v.vendor),0)];
    const showVal=cols[cols.length-1];
    const den=foodDen?pl.foodSales:alcDen?pl.alcSales:pl.totalSales;
    return <tr className="subtotal-row"><td><b>{label}</b></td>{cols.map((v,i)=><td key={i}><b>{fmtCur(v)}</b></td>)}<td><b>{fmtPct(showVal,den)}</b></td></tr>;
  }

  function TotalSalesRow() {
    const locVals=LOCATIONS.map(l=>locSales(l,'food')+locSales(l,'alc'));
    const total=locVals.reduce((a,b)=>a+b,0);
    const cols=location===ALL_LOCS?[...locVals,total]:[locSales(location,'food')+locSales(location,'alc')];
    return <tr className="total-row"><td>TOTAL GROSS SALES</td>{cols.map((v,i)=><td key={i}>{fmtCur(v)}</td>)}<td>100.0%</td></tr>;
  }

  // Payroll helpers — condensed to match Excel: PAYROLL 1, TIPS, LOANS
  const wageKeys = ['regular','salary','bonus','ss','med','fees'];
  function locPayroll1(loc) { const p=pay[loc]||{}; return wageKeys.reduce((s,k)=>s+(+p[k]||0),0); }
  function locTips(loc) { return(+(pay[loc]||{}).tips||0); }
  function locLoans(loc) { return(+(pay[loc]||{}).loans||0); }
  function locPayrollExpTotal(loc) { return locPayroll1(loc)+locTips(loc)+locLoans(loc); }

  function PayrollCondensedRow({label,calcFn}) {
    const locVals=LOCATIONS.map(l=>calcFn(l));
    const total=locVals.reduce((a,b)=>a+b,0);
    const cols=location===ALL_LOCS?[...locVals,total]:[calcFn(location)];
    const showVal=cols[cols.length-1];
    return <tr><td style={{paddingLeft:24,color:'#374151'}}>{label}</td>{cols.map((v,i)=><td key={i}>{v>0?fmtCur(v):'-'}</td>)}<td style={{color:'#94a3b8'}}>{fmtPct(showVal,pl.totalSales)}</td></tr>;
  }

  function PayrollSubtotalRow({label,calcFn}) {
    const locVals=LOCATIONS.map(l=>calcFn(l));
    const total=locVals.reduce((a,b)=>a+b,0);
    const cols=location===ALL_LOCS?[...locVals,total]:[calcFn(location)];
    const showVal=cols[cols.length-1];
    return <tr className="subtotal-row"><td><b>{label}</b></td>{cols.map((v,i)=><td key={i}><b>{fmtCur(v)}</b></td>)}<td><b>{fmtPct(showVal,pl.totalSales)}</b></td></tr>;
  }

  // Bottom summary rows
  function TotalExpensesRow() {
    const pll=appData.plLines||{Food:FOOD_VENDORS,Alcohol:ALCOHOL_VENDORS,Utilities:UTILITIES,Other:OTHER_EXPENSES,'Bank Card':BANK_CARD};
    const allV=[...(pll.Food||[]),...(pll.Alcohol||[]),...(pll.Utilities||[]),...(pll.Other||[]),...(pll['Bank Card']||[])];
    const locVals=LOCATIONS.map(l=>allV.reduce((sum,v)=>sum+locVendorAmt(l,v),0)+locPayroll(l));
    const total=locVals.reduce((a,b)=>a+b,0);
    const cols=location===ALL_LOCS?[...locVals,total]:[locVals[LOCATIONS.indexOf(location)]||0];
    return <tr className="total-row"><td>TOTAL EXPENSES</td>{cols.map((v,i)=><td key={i}>{fmtCur(v)}</td>)}<td>{fmtPct(cols[cols.length-1],pl.totalSales)}</td></tr>;
  }

  function TotalSalesForRow() {
    const locVals=LOCATIONS.map(l=>locSales(l,'food')+locSales(l,'alc'));
    const total=locVals.reduce((a,b)=>a+b,0);
    const cols=location===ALL_LOCS?[...locVals,total]:[locSales(location,'food')+locSales(location,'alc')];

  return (

            <SectionRow label="ALCOHOL"/>

            <SectionRow label="UTILITY BILLS"/>
            {pl.utilExp.map(v=><VendorRow key={v.vendor} vendor={v.vendor}/>)}

            <SectionRow label="OTHER"/>

          </tbody>
        </table>
      </div>
    </div>
  );
}

function VendorImportModal({ onClose }) {
  const { data, setData } = useApp();
  const { allPLLines, plLineCat } = usePLLines();
  const [step, setStep] = useState(0);
  const [rows, setRows] = useState([]);
  const [headers, setHeaders] = useState([]);
  const [mapping, setMapping] = useState({name:-1,plLine:-1,category:-1,subCategory:-1});
  const [preview, setPreview] = useState([]);
  const fileRef = useRef(null);

  const FIELDS=[
    {key:'name',label:'Vendor Name',keywords:['vendor','name','company','supplier','payee']},
    {key:'plLine',label:'P&L Line Item',keywords:['p&l','pl','line item','account','pl line']},
    {key:'category',label:'Category',keywords:['category','type','class','group']},
    {key:'subCategory',label:'Sub-Category',keywords:['sub','subcategory','sub-category','detail']},
  ];

  function handleFile(file) {
    if(!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const parsed = parseCSV(e.target.result);
      if(parsed.length<2) { alert('CSV must have a header row and at least one data row.'); return; }
      const hdrs = parsed[0];
      setHeaders(hdrs);
      setRows(parsed.slice(1));
      // Auto-detect columns
      const m = {name:-1,plLine:-1,category:-1,subCategory:-1};
      for(const f of FIELDS) {
        for(let i=0;i<hdrs.length;i++) {
          const h = hdrs[i].toLowerCase().trim();
          if(f.keywords.some(k=>h.includes(k))) { m[f.key]=i; break; }
        }
      }
      setMapping(m);
      setStep(1);
    };
    reader.readAsText(file);
  }

  function buildPreview() {
    return rows.map(r=>{
      const name = mapping.name>=0 ? (r[mapping.name]||'').trim() : '';
      const plLine = mapping.plLine>=0 ? (r[mapping.plLine]||'').trim().toUpperCase() : '';
      let category = mapping.category>=0 ? (r[mapping.category]||'').trim() : '';
      const subCategory = mapping.subCategory>=0 ? (r[mapping.subCategory]||'').trim() : '';
      // Auto-set category from plLine if available
      if(!category && plLine && plLineCat[plLine]) category = plLineCat[plLine];
      if(!category) category = 'Other';
      return { name, plLine, category, subCategory };
    }).filter(v=>v.name);
  }

  function goToPreview() {
    if(mapping.name<0) { alert('Please map the Vendor Name column.'); return; }
    setPreview(buildPreview());
    setStep(2);
  }

  function doImport() {
    const newVendors = preview.map(v=>({id:uid(), name:v.name, plLine:v.plLine, category:v.category, subCategory:v.subCategory}));
    setData(prev=>({...prev, vendors:[...prev.vendors, ...newVendors]}));
    onClose();
  }

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-box" style={{maxWidth:780}} onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <div style={{fontWeight:700,fontSize:16}}>CSV Vendor Import</div>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,color:'#64748b',cursor:'pointer'}}>×</button>
        </div>
        <div className="modal-body">
          <StepBar steps={['Upload CSV','Map Columns','Preview & Import']} current={step}/>

          {step===0 && (
            <div>
              <div className="drop-zone" onClick={()=>fileRef.current?.click()}
                onDragOver={e=>{e.preventDefault();e.currentTarget.classList.add('drag-over');}}
                onDragLeave={e=>e.currentTarget.classList.remove('drag-over')}
                onDrop={e=>{e.preventDefault();e.currentTarget.classList.remove('drag-over');handleFile(e.dataTransfer.files[0]);}}>
                <div style={{fontSize:28,marginBottom:8}}>📂</div>
                <div style={{fontSize:14,fontWeight:600,color:'#374151',marginBottom:4}}>Drop your vendor CSV here</div>
                <div style={{fontSize:12,color:'#94a3b8'}}>or click to browse — expects columns like: Vendor Name, P&L Line Item, Category</div>
              </div>
              <input ref={fileRef} type="file" accept=".csv,.txt" style={{display:'none'}} onChange={e=>handleFile(e.target.files[0])}/>
            </div>
          )}

          {step===1 && (
            <div>
              <div style={{fontSize:13,fontWeight:600,color:'#374151',marginBottom:12}}>Map your CSV columns to vendor fields</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
                {FIELDS.map(f=>(
                  <div key={f.key}>
                    <label style={{fontSize:11,color:'#64748b',display:'block',marginBottom:3}}>{f.label} {f.key==='name'&&<span style={{color:'#dc2626'}}>*</span>}</label>
                    <select value={mapping[f.key]} onChange={e=>setMapping(m=>({...m,[f.key]:+e.target.value}))} style={{width:'100%'}}>
                      <option value={-1}>— Skip —</option>
                      {headers.map((h,i)=><option key={i} value={i}>{h}</option>)}
                    </select>
                  </div>
                ))}
              </div>
              <div style={{fontSize:12,color:'#64748b',marginBottom:8}}>Preview of first 3 rows:</div>
              <table className="preview-table" style={{marginBottom:12}}>
                <thead><tr>{headers.map((h,i)=><th key={i} style={{textAlign:'left',background:Object.values(mapping).includes(i)?'#dbeafe':'#f8fafc'}}>{h}</th>)}</tr></thead>
                <tbody>{rows.slice(0,3).map((r,ri)=><tr key={ri}>{r.map((c,ci)=><td key={ci} style={{textAlign:'left',background:Object.values(mapping).includes(ci)?'#eff6ff':'transparent'}}>{c}</td>)}</tr>)}</tbody>
              </table>
            </div>
          )}

          {step===2 && (
            <div>
              <div style={{fontSize:13,fontWeight:600,color:'#374151',marginBottom:4}}>Ready to import {preview.length} vendor(s)</div>
              <div style={{fontSize:12,color:'#94a3b8',marginBottom:12}}>Review the data below. Vendors will be added to your existing Vendor Map.</div>
              <div style={{maxHeight:340,overflowY:'auto'}}>
                <table className="preview-table">
                  <thead><tr><th style={{textAlign:'left'}}>Vendor Name</th><th style={{textAlign:'left'}}>P&L Line Item</th><th style={{textAlign:'left'}}>Category</th><th style={{textAlign:'left'}}>Sub-Category</th></tr></thead>
                  <tbody>
                    {preview.map((v,i)=>(
                      <tr key={i}>
                        <td style={{textAlign:'left',fontWeight:500}}>{v.name}</td>
                        <td style={{textAlign:'left'}}>{v.plLine||'—'}</td>
                        <td style={{textAlign:'left'}}><span className={`badge ${{'Food':'badge-food','Alcohol':'badge-alcohol','Utilities':'badge-utilities','Other':'badge-other','Bank Card':'badge-bank'}[v.category]||'badge-other'}`}>{v.category}</span></td>
                        <td style={{textAlign:'left'}}>{v.subCategory||'—'}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
        <div className="modal-footer">
          {step>0 && <button className="btn-ghost" onClick={()=>setStep(s=>s-1)}>Back</button>}
          <button className="btn-ghost" onClick={onClose}>Cancel</button>
          {step===1 && <button className="btn-primary" onClick={goToPreview}>Next: Preview</button>}
          {step===2 && <button className="btn-success" onClick={doImport} style={{display:'flex',alignItems:'center',gap:5}}><Icon name="import"/>Import {preview.length} Vendors</button>}
        </div>
      </div>
    </div>
  );
}

function VendorManagement() {
  const { data, setData } = useApp();
  const allCats = useAllCategories();
  const { plLines, allPLLines, plLineCat } = usePLLines();
  const [form, setForm] = useState({name:'',plLine:'MISC EXPENSES',category:'Other',subCategory:''});
  const [newCat, setNewCat] = useState('');
  const [editCat, setEditCat] = useState(null); // { old, val }
  const [search, setSearch] = useState('');
  const [newLine, setNewLine] = useState({});
  const [editingLine, setEditingLine] = useState(null); // {cat,idx,val}
  const [showVendorImport, setShowVendorImport] = useState(false);
  const vendors = useMemo(()=>{ const all=data.vendors||[]; if(!search)return all; const s=search.toLowerCase(); return all.filter(v=>v.name.toLowerCase().includes(s)||(v.plLine||'').toLowerCase().includes(s)||v.category.toLowerCase().includes(s)); },[data.vendors,search]);

  function handlePlLineChange(val) { setForm(f=>({...f,plLine:val,category:plLineCat[val]||f.category})); }
  function addVendor() { if(!form.name)return; setData(prev=>({...prev,vendors:[...prev.vendors,{id:uid(),name:form.name,plLine:form.plLine,category:form.category,subCategory:form.subCategory}]})); setForm(f=>({...f,name:'',subCategory:''})); }
  function removeVendor(id) { if(!id)return; setData(prev=>({...prev,vendors:prev.vendors.filter(v=>v.id!==id)})); }
  function updateVendor(id,key,val) {
    if(!id) return;
    setData(prev=>{
      const dynCat = {};
      const pl = prev.plLines || {};
      for (const c in pl) (pl[c]||[]).forEach(v=>dynCat[v]=c);
      return {...prev,vendors:prev.vendors.map(v=>{
        if(!(v.id&&v.id===id)) return v;
        const u={...v,[key]:val};
        if(key==='plLine'&&dynCat[val]) u.category=dynCat[val];
        return u;
      })};
    });
  }

  // ── P&L Line Items management ──
  function addPLLine(cat) {
    const name = (newLine[cat]||'').trim().toUpperCase();
    if (!name) return;
    if (allPLLines.includes(name)) { alert(`"${name}" already exists.`); return; }
    setData(prev=>{
      const pl = {...(prev.plLines||{})};
      pl[cat] = [...(pl[cat]||[]), name];
      return {...prev, plLines:pl};
    });
    setNewLine(prev=>({...prev,[cat]:''}));
  }
  function removePLLine(cat, idx) {
    const lineName = (plLines[cat]||[])[idx];
    if (!lineName) return;
    const usedCount = Object.values(data.expenses||{}).flat().filter(e=>e.vendor===lineName).length;
    if (usedCount > 0 && !confirm(`"${lineName}" is used in ${usedCount} expense(s). Remove anyway?`)) return;
    setData(prev=>{
      const d = {...prev};
      const pl = {...(d.plLines||{})};
      pl[cat] = (pl[cat]||[]).filter((_,i)=>i!==idx);
      d.plLines = pl;
      d.vendors = (d.vendors||[]).map(v=>v.plLine===lineName?{...v,plLine:''}:v);
      return d;
    });
  }
  function commitRenamePLLine(cat, idx, newName) {
    const oldName = (plLines[cat]||[])[idx];
    if (!oldName || oldName===newName) return;
    setData(prev=>{
      const d = {...prev};
      const pl = {...(d.plLines||{})};
      pl[cat] = [...(pl[cat]||[])];
      pl[cat][idx] = newName;
      d.plLines = pl;
      d.vendors = (d.vendors||[]).map(v=>v.plLine===oldName?{...v,plLine:newName}:v);
      const newExp = {};
      for (const m in (d.expenses||{})) newExp[m] = (d.expenses[m]||[]).map(e=>e.vendor===oldName?{...e,vendor:newName}:e);
      d.expenses = {...d.expenses,...newExp};
      return d;
    });
  }

  // Category management
  function addCategory() {
    if (!newCat.trim()) return;
    const name = newCat.trim();
    if (allCats.includes(name)) return;
    setData(prev=>({...prev,customCategories:[...(prev.customCategories||[]),name]}));
    setNewCat('');
  }
  function removeCategory(name) {
    // Only custom categories can be removed
    if (CATEGORIES.includes(name)) return;
    const usedBy = (data.vendors||[]).filter(v=>v.category===name);
    if (usedBy.length>0 && !confirm(`${usedBy.length} vendor(s) use "${name}". They will be set to "Other". Continue?`)) return;
    setData(prev=>({
      ...prev,
      customCategories:(prev.customCategories||[]).filter(c=>c!==name),
      vendors:(prev.vendors||[]).map(v=>v.category===name?{...v,category:'Other'}:v)
    }));
  }
  function renameCategory(oldName, newName) {
    if (!newName.trim() || newName===oldName) { setEditCat(null); return; }
    const n = newName.trim();
    if (CATEGORIES.includes(oldName)) return; // can't rename defaults
    setData(prev=>({
      ...prev,
      customCategories:(prev.customCategories||[]).map(c=>c===oldName?n:c),
      vendors:(prev.vendors||[]).map(v=>v.category===oldName?{...v,category:n}:v)
    }));
    setEditCat(null);
  }

  const catBadge={Food:'badge-food',Alcohol:'badge-alcohol',Utilities:'badge-utilities',Other:'badge-other','Bank Card':'badge-bank'};
  const catCounts = useMemo(()=>{ const c={}; for(const v of(data.vendors||[])) c[v.category]=(c[v.category]||0)+1; return c; },[data.vendors]);

  return (
    <div>
      {showVendorImport && <VendorImportModal onClose={()=>setShowVendorImport(false)}/>}
      <Header title="Vendor Map" subtitle="Manage categories and vendor-to-category assignments">
        <button className="btn-amber" onClick={()=>setShowVendorImport(true)} style={{display:'flex',alignItems:'center',gap:6}}>
          <Icon name="import"/>CSV Vendor Import
        </button>
      </Header>

      {/* ── Category Manager ── */}
      <div className="card" style={{marginBottom:16}}>
        <div style={{fontWeight:700,color:'#0f172a',fontSize:14,marginBottom:14,display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:4,height:16,background:'#6366f1',borderRadius:2}}/>
          Expense Categories
          <span style={{fontSize:11,color:'#94a3b8',fontWeight:400}}>— used to group vendors in the P&L</span>
        </div>
        <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:12}}>
          {allCats.map(c=>{
            const isDefault = CATEGORIES.includes(c);
            const isEditing = editCat && editCat.old===c;
            return (
              <div key={c} style={{display:'flex',alignItems:'center',gap:4,background:isDefault?'#f1f5f9':'#ede9fe',border:`1px solid ${isDefault?'#e2e8f0':'#c4b5fd'}`,borderRadius:8,padding:'4px 10px'}}>
                {isEditing ? (
                  <input autoFocus value={editCat.val} onChange={e=>setEditCat({old:c,val:e.target.value})}
                    onBlur={()=>renameCategory(c,editCat.val)} onKeyDown={e=>{if(e.key==='Enter')renameCategory(c,editCat.val);if(e.key==='Escape')setEditCat(null);}}
                    style={{width:100,fontSize:12,padding:'1px 4px',border:'1px solid #a78bfa',borderRadius:4}}/>
                ) : (
                  <span style={{fontSize:12.5,fontWeight:600,color:isDefault?'#374151':'#5b21b6',cursor:isDefault?'default':'pointer'}}
                    onClick={()=>{if(!isDefault) setEditCat({old:c,val:c});}}
                    title={isDefault?'Default category':'Click to rename'}>
                    {c}
                  </span>
                )}
                <span style={{fontSize:10,color:'#94a3b8'}}>({catCounts[c]||0})</span>
                {!isDefault && (
                  <button onClick={()=>removeCategory(c)} style={{background:'none',border:'none',padding:'0 2px',color:'#dc2626',cursor:'pointer',fontSize:12}} title="Delete category">×</button>
                )}
              </div>
            );
          })}
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <input value={newCat} onChange={e=>setNewCat(e.target.value)} placeholder="New category name…" style={{width:200,fontSize:12}}
            onKeyDown={e=>{if(e.key==='Enter') addCategory();}} />
          <button className="btn-primary" onClick={addCategory} style={{fontSize:12,padding:'5px 12px',display:'flex',alignItems:'center',gap:4}}><Icon name="add" size={12}/>Add Category</button>
        </div>
        <div style={{fontSize:11,color:'#94a3b8',marginTop:8}}>Default categories (Food, Alcohol, Utilities, Other, Bank Card) cannot be removed. Custom categories can be renamed by clicking on them.</div>
      </div>

      {/* ── P&L Line Items Editor ── */}
      <div className="card" style={{marginBottom:16}}>
        <div style={{fontWeight:700,color:'#0f172a',fontSize:14,marginBottom:14,display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:4,height:16,background:'#1d4ed8',borderRadius:2}}/>
          P&L Line Items
          <span style={{fontSize:11,color:'#94a3b8',fontWeight:400}}>— vendor rows that appear on the P&L Report (click name to rename, press Enter to save)</span>
        </div>
        {CATEGORIES.map(cat=>(
          <div key={cat} style={{marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:700,color:'#475569',marginBottom:6,textTransform:'uppercase',letterSpacing:'.04em'}}>{cat} <span style={{fontWeight:400,color:'#94a3b8'}}>({(plLines[cat]||[]).length})</span></div>
            <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:8}}>
              {(plLines[cat]||[]).map((item,idx)=>{
                const isEd = editingLine && editingLine.cat===cat && editingLine.idx===idx;
                return (
                  <div key={idx} style={{display:'flex',alignItems:'center',gap:4,background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:6,padding:'3px 8px'}}>
                    <input
                      value={isEd ? editingLine.val : item}
                      onChange={e=>setEditingLine({cat,idx,val:e.target.value})}
                      onFocus={()=>setEditingLine({cat,idx,val:item})}
                      onBlur={()=>{ if(editingLine && editingLine.val!==item) commitRenamePLLine(cat,idx,editingLine.val); setEditingLine(null); }}
                      onKeyDown={e=>{if(e.key==='Enter'){e.target.blur();}if(e.key==='Escape'){setEditingLine(null);e.target.blur();}}}
                      style={{border:'none',background:'transparent',fontSize:12,fontWeight:500,width:Math.max(70,item.length*7.5+16),color:'#1e293b'}}
                    />
                    <button onClick={()=>removePLLine(cat,idx)} style={{background:'none',border:'none',color:'#dc2626',cursor:'pointer',fontSize:14,padding:'0 2px',lineHeight:1}} title="Remove line item">×</button>
                  </div>
                );
              })}
            </div>
            <div style={{display:'flex',gap:6,alignItems:'center'}}>
              <input value={newLine[cat]||''} onChange={e=>setNewLine(prev=>({...prev,[cat]:e.target.value}))} placeholder={`Add ${cat} line item…`} style={{fontSize:12,width:200}} onKeyDown={e=>{if(e.key==='Enter')addPLLine(cat);}}/>
              <button className="btn-ghost" onClick={()=>addPLLine(cat)} style={{fontSize:11,padding:'4px 10px'}}>+ Add</button>
            </div>
          </div>
        ))}
      </div>

      {/* ── Add Vendor ── */}
      <div className="card" style={{marginBottom:16}}>
        <div style={{fontWeight:600,color:'#0f172a',marginBottom:12,fontSize:14}}>Add Vendor</div>
        <div style={{display:'flex',gap:10,alignItems:'flex-end',flexWrap:'wrap'}}>
          <div><label style={{fontSize:11,color:'#64748b',display:'block',marginBottom:3}}>Vendor Name (as entered)</label><input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Vendor Name" style={{width:200}}/></div>

          <div style={{fontWeight:600,color:'#0f172a',fontSize:14}}>Vendor Map <span style={{color:'#94a3b8',fontWeight:400,fontSize:12}}>({vendors.length})</span></div>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search…" style={{fontSize:12,width:180}}/>
        </div>
        <table>
          <thead><tr><th style={{textAlign:'left'}}>Vendor Name (as entered)</th><th style={{textAlign:'left'}}>P&L Line Item</th><th style={{textAlign:'left'}}>Category</th><th style={{textAlign:'left'}}>Sub-Category</th><th></th></tr></thead>
          <tbody>
            {vendors.map(v=>(
              <tr key={v.id}>
                <td style={{textAlign:'left',fontWeight:500}}><input value={v.name} onChange={e=>updateVendor(v.id,'name',e.target.value)} style={{border:'none',background:'transparent',fontWeight:500,fontSize:13,width:'100%',padding:'2px 0',color:'#1e293b'}} /></td>

                <td style={{textAlign:'left'}}><select value={v.category} onChange={e=>updateVendor(v.id,'category',e.target.value)} style={{fontSize:12,padding:'2px 6px'}}>{allCats.map(c=><option key={c} value={c}>{c}</option>)}</select></td>

// ─── Duplicates Review Page ───────────────────────────────────────────────────
function DuplicatesReview() {
  const { data, setData, setPage } = useApp();
  const pending = useMemo(()=>(data.flaggedDuplicates||[]).filter(f=>f.status==='pending'),[data.flaggedDuplicates]);
  const highCount = pending.filter(f=>f.confidence==='HIGH').length;
  const medCount  = pending.filter(f=>f.confidence==='MED').length;

  function resolveKeepExisting(flagId) {
    // Discard the incoming entry, just remove the flag
    setData(prev=>({...prev, flaggedDuplicates:(prev.flaggedDuplicates||[]).filter(f=>f.id!==flagId)}));
  }

  function resolveKeepBoth(flagId) {
    // Add incoming to expenses + remove flag
    const flag = (data.flaggedDuplicates||[]).find(f=>f.id===flagId);
    if (!flag) return;
    setData(prev=>{
      const d={...prev};
      const m = flag.month || Object.keys(d.expenses).pop() || getCurrentMonth();
      if (!d.expenses[m]) d.expenses={...d.expenses,[m]:[]};
      d.expenses[m] = [flag.incoming, ...d.expenses[m]];
      d.flaggedDuplicates = (d.flaggedDuplicates||[]).filter(f=>f.id!==flagId);
      return d;
    });
  }

  function resolveReplaceExisting(flagId) {
    // Delete old, add incoming, remove flag
    const flag = (data.flaggedDuplicates||[]).find(f=>f.id===flagId);
    if (!flag) return;
    setData(prev=>{
      const d={...prev};
      const m = flag.month || Object.keys(d.expenses).pop() || getCurrentMonth();
      // Remove old
      for (const mo in d.expenses) d.expenses[mo] = (d.expenses[mo]||[]).filter(e=>e.id!==flag.existingId);
      // Add new
      if (!d.expenses[m]) d.expenses={...d.expenses,[m]:[]};
      d.expenses[m] = [flag.incoming, ...d.expenses[m]];
      d.flaggedDuplicates = (d.flaggedDuplicates||[]).filter(f=>f.id!==flagId);
      return d;
    });
  }

  function resolveAll(action) {
    if (!confirm(`${action==='discard'?'Discard':'Keep'} all ${pending.length} flagged entries?`)) return;
    if (action==='discard') {
      setData(prev=>({...prev, flaggedDuplicates:[]}));
    } else {
      setData(prev=>{
        const d={...prev};
        for (const flag of pending) {
          const m = flag.month || getCurrentMonth();
          if (!d.expenses[m]) d.expenses={...d.expenses,[m]:[]};
          d.expenses[m] = [flag.incoming, ...d.expenses[m]];
        }
        d.flaggedDuplicates = [];
        return d;
      });
    }
  }

  function Field({label,value}) {
    return <div><div className="dup-field">{label}</div><div className="dup-value">{value||'—'}</div></div>;
  }

  return (
    <div>
      <Header title="Duplicate Review" subtitle="Resolve flagged invoices and receipts"/>

      {pending.length===0 ? (
        <div className="card" style={{textAlign:'center',padding:'50px 20px'}}>
          <div style={{fontSize:44,marginBottom:12}}>✅</div>
          <div style={{fontWeight:700,fontSize:18,color:'#0f172a',marginBottom:6}}>All clear!</div>
          <div style={{color:'#64748b',fontSize:14}}>No duplicate invoices or receipts to review.</div>
          <button className="btn-primary" style={{marginTop:16}} onClick={()=>setPage('expenses')}>Go to Expense Entry</button>
        </div>
      ) : (
        <div>
          {/* Summary bar */}
          <div style={{display:'flex',gap:12,marginBottom:18,alignItems:'center',flexWrap:'wrap'}}>
            <div style={{display:'flex',alignItems:'center',gap:6,fontSize:13}}>
              <span className="conf-badge-high">HIGH</span> <span style={{fontWeight:600}}>{highCount}</span>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:6,fontSize:13}}>
              <span className="conf-badge-med">MEDIUM</span> <span style={{fontWeight:600}}>{medCount}</span>
            </div>
            <div style={{flex:1}}/>
            <button className="btn-ghost" onClick={()=>resolveAll('discard')} style={{fontSize:12}}>Discard All</button>
            <button className="btn-success" onClick={()=>resolveAll('keepAll')} style={{fontSize:12}}>Keep All (import all)</button>
          </div>

          {/* Flag cards */}
          {pending.map(flag=>(
            <div key={flag.id} className={`dup-card${flag.confidence==='MED'?' med':''}`}>
              <div className="dup-card-header">
                <span className={flag.confidence==='HIGH'?'conf-badge-high':'conf-badge-med'}>{flag.confidence}</span>
                <span style={{fontSize:12.5,color:'#374151',fontWeight:500}}>{flag.reason}</span>
              </div>
              <div style={{display:'flex'}}>
                <div className="dup-side existing">
                  <div style={{fontSize:10,textTransform:'uppercase',letterSpacing:'.06em',color:'#94a3b8',fontWeight:700,marginBottom:8}}>Existing Record</div>
                  <Field label="Date" value={flag.existing.date}/>
                  <Field label="Vendor" value={flag.existing.vendor}/>
                  <Field label="Amount" value={fmtCur(flag.existing.amount)}/>
                  <Field label="Invoice #" value={flag.existing.invoiceNumber}/>
                  <Field label="Category" value={flag.existing.category}/>
                  <Field label="Location" value={flag.existing.location}/>
                </div>
                <div className="dup-side">
                  <div style={{fontSize:10,textTransform:'uppercase',letterSpacing:'.06em',color:'#d97706',fontWeight:700,marginBottom:8}}>Incoming (New)</div>
                  <Field label="Date" value={flag.incoming.date}/>
                  <Field label="Vendor" value={flag.incoming.vendor}/>
                  <Field label="Amount" value={fmtCur(flag.incoming.amount)}/>
                  <Field label="Invoice #" value={flag.incoming.invoiceNumber}/>
                  <Field label="Category" value={flag.incoming.category}/>
                  <Field label="Location" value={flag.incoming.location}/>
                </div>
              </div>
              <div style={{display:'flex',gap:8,padding:'10px 16px',borderTop:'1px solid #f1f5f9',background:'#fafafa'}}>
                <button className="btn-danger" onClick={()=>resolveKeepExisting(flag.id)} style={{fontSize:12,display:'flex',alignItems:'center',gap:4}}>
                  <Icon name="x" size={12}/>Discard New
                </button>
                <button className="btn-success" onClick={()=>resolveKeepBoth(flag.id)} style={{fontSize:12,display:'flex',alignItems:'center',gap:4}}>
                  <Icon name="check" size={12}/>Keep Both
                </button>
                <button className="btn-amber" onClick={()=>resolveReplaceExisting(flag.id)} style={{fontSize:12,display:'flex',alignItems:'center',gap:4}}>
                  <Icon name="swap" size={12}/>Replace Existing
                </button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── App Root ─────────────────────────────────────────────────────────────────
function App() {
  const [page,setPage]=useState('dashboard');
  const [month,setMonth]=useState(getCurrentMonth());
  const [location,setLocation]=useState(ALL_LOCS);
  const [data,setDataRaw]=useState(loadData);
  const setData=useCallback((updater)=>{
    setDataRaw(prev=>{ const next=typeof updater==='function'?updater(prev):updater; saveData(next); return next; });
  },[]);
  const ctx={data,setData,month,setMonth,location,setLocation,page,setPage};
  const pages={dashboard:Dashboard,pl:PLReport,revenue:RevenueEntry,expenses:ExpenseEntry,payroll:PayrollEntry,vendors:VendorManagement,duplicates:DuplicatesReview};
  const PageComponent=pages[page]||Dashboard;
  return (
    <Ctx.Provider value={ctx}>
      <div style={{display:'flex',minHeight:'100vh'}}>
        <Sidebar page={page} setPage={setPage}/>
        <div className="main-content"><PageComponent/></div>
      </div>
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
